<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Circular Playlist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .playlist-card {
      max-width: 600px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
    }
    .playlist-card h2 {
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px;
    }
    .btn-custom {
      border-radius: 8px;
      padding: 10px 25px;
      font-size: 15px;
      font-weight: 600;
      margin: 5px;
    }
    .btn-primary {
      background-color: #0d6efd;
      border: none;
    }
    .btn-primary:hover {
      background-color: #0b5ed7;
    }
    .btn-success {
      background-color: #198754;
      border: none;
    }
    .btn-success:hover {
      background-color: #157347;
    }
    .btn-secondary {
      background-color: #6c757d;
      border: none;
    }
    .btn-secondary:hover {
      background-color: #5c636a;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      background: #f8f9fa;
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <div class="playlist-card">
    <h2>🎵 Circular Playlist</h2>

    <!-- Add Song Form -->
    <form method="POST" class="mb-4 d-flex justify-content-center">
      <input type="text" name="song" class="form-control me-2" placeholder="Enter song title" required>
      <button type="submit" class="btn btn-success btn-custom">
        <i class="bi bi-plus-circle"></i> Add Song
      </button>
    </form>

    <!-- Status -->
    <p class="fw-semibold text-primary">{{ status }}</p>

    <!-- Playlist -->
    <h4 class="mt-3">Playlist</h4>
    <ul class="mb-4">
      {% for s in songs %}
        <li>{{ s }}</li>
      {% endfor %}
    </ul>

    <!-- Controls -->
    <div class="mt-3">
      <a href="/playlist/next" class="btn btn-primary btn-custom">
        ▶ Next
      </a>
      <a href="/playlist/prev" class="btn btn-primary btn-custom">
        ⏮ Previous
      </a>
      <a href="/" class="btn btn-secondary btn-custom">
        ⬅ Back to Hub
      </a>
    </div>
  </div>

</body>
</html>
