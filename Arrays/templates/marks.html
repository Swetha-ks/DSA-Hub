<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Marks Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .form-card {
      max-width: 800px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      padding: 40px;
    }
    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-header h2 {
      font-weight: bold;
      color: #0d6efd;
    }
    .form-header p {
      color: #6c757d;
    }
    .form-control {
      border-radius: 8px;
      padding: 12px;
    }
    .btn-custom {
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
    }
    .btn-success {
      background-color: #198754;
      border: none;
    }
    .btn-success:hover {
      background-color: #157347;
    }
    .btn-outline-secondary {
      border: 2px solid #6c757d;
    }
    .btn-outline-secondary:hover {
      background-color: #6c757d;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="form-card">
    <!-- Header -->
    <div class="form-header">
      <h2>📋 Student Marks Entry</h2>
      <p>Please fill in the details below</p>
    </div>

    <!-- Form -->
    <form method="POST" action="/arrays/results">
      <input type="hidden" name="num_students" value="{{ num_students }}">

      <div class="row">
        {% for i in range(num_students) %}
        <div class="col-md-6 mb-4">
          <div class="border rounded p-3 bg-light">
            <h6 class="fw-bold text-secondary mb-3">Student {{ loop.index }}</h6>
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" name="name{{ i }}" class="form-control" placeholder="Enter student name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Mark</label>
              <input type="number" name="mark{{ i }}" class="form-control" placeholder="Enter mark" required>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>

      <!-- Buttons -->
      <div class="text-center mt-4">
        <button type="submit" class="btn btn-success btn-custom me-3 shadow-sm">
          <i class="bi bi-check-circle"></i> Submit Marks
        </button>
        <button type="reset" class="btn btn-outline-secondary btn-custom shadow-sm">
          <i class="bi bi-arrow-counterclockwise"></i> Reset Form
        </button>
      </div>
    </form>
  </div>

</body>
</html>
